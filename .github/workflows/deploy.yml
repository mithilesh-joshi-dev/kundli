name: Deploy to Cloud Run

on:
  push:
    branches: [main]

env:
  GCP_REGION: asia-south1
  SERVICE_NAME: kundli

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy $SERVICE_NAME \
            --source=. \
            --region=$GCP_REGION \
            --project=${{ secrets.GCP_PROJECT_ID }} \
            --allow-unauthenticated \
            --port=8000 \
            --memory=512Mi \
            --cpu=1 \
            --min-instances=0 \
            --max-instances=2 \
            --set-env-vars="KUNDLI_WORKERS=1,KUNDLI_DEFAULT_LANG=mr,KUNDLI_LOG_LEVEL=info,KUNDLI_FIRESTORE_ENABLED=true" \
            --quiet

      - name: Show URL
        run: |
          URL=$(gcloud run services describe $SERVICE_NAME --region=$GCP_REGION --project=${{ secrets.GCP_PROJECT_ID }} --format="value(status.url)")
          echo "Deployed to: $URL"
