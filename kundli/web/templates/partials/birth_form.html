<!-- Reusable birth data form -->
<div class="space-y-3">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_date") }}</label>
            <input type="date" name="date" required
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none"
                   value="{{ default_date or '' }}">
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_time") }}</label>
            <input type="time" name="time" step="1" required
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none"
                   value="{{ default_time or '' }}">
        </div>
        <div>
            <label class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_place") }}</label>
            <input type="text" name="place" placeholder="Pune, Delhi, Amravati..."
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none"
                   hx-get="/api/geocode" hx-trigger="keyup changed delay:400ms" hx-target="#city-suggest-{{ form_id }}"
                   hx-params="*" hx-vals='{"q": "this.value"}'
                   autocomplete="off"
                   value="{{ default_place or '' }}">
            <div id="city-suggest-{{ form_id }}" class="text-xs text-gray-400 mt-1"></div>
        </div>
    </div>

    <!-- Coordinates (collapsible) -->
    <details class="group">
        <summary class="inline-flex items-center gap-1 text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition">
            <svg class="w-3 h-3 chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            {{ T("ui.or_coordinates") }}
        </summary>
        <div class="grid grid-cols-3 gap-3 mt-2 pt-2 border-t border-dashed border-gray-200">
            <div>
                <label class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.latitude") }}</label>
                <input type="number" step="0.0001" name="lat" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.longitude") }}</label>
                <input type="number" step="0.0001" name="lon" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
            <div>
                <label class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.utc_offset") }}</label>
                <input type="number" step="0.5" name="utc_offset" value="5.5" class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
        </div>
    </details>
</div>
