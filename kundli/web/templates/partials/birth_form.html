<!-- Reusable birth data form -->
<div class="space-y-3">
    <div class="grid grid-cols-1 sm:grid-cols-3 gap-3">
        <div>
            <label for="date-{{ form_id }}" class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_date") }}</label>
            <input type="date" name="date" id="date-{{ form_id }}" required
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none">
        </div>
        <div>
            <label for="time-{{ form_id }}" class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_time") }}</label>
            <input type="time" name="time" id="time-{{ form_id }}" step="1" required
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none">
        </div>
        <div class="relative" id="place-wrapper-{{ form_id }}">
            <label for="place-input-{{ form_id }}" class="block text-xs font-medium text-gray-500 mb-1">{{ T("ui.birth_place") }}</label>
            <input type="text" name="place"
                   id="place-input-{{ form_id }}"
                   placeholder="{{ T('ui.place_placeholder') }}"
                   autocomplete="off"
                   class="w-full border border-gray-200 rounded-xl px-3 py-2.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 focus:border-saffron-400 transition outline-none">
            <!-- Autocomplete dropdown -->
            <div id="place-dropdown-{{ form_id }}"
                 class="hidden absolute z-50 left-0 right-0 w-full top-full mt-1 bg-white border border-gray-200 rounded-xl shadow-lg overflow-hidden max-h-60">
            </div>
        </div>
    </div>

    <!-- Coordinates (collapsible) -->
    <details class="group">
        <summary class="inline-flex items-center gap-1 text-xs text-gray-400 cursor-pointer hover:text-gray-600 transition">
            <svg class="w-3 h-3 chevron" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7"/></svg>
            {{ T("ui.or_coordinates") }}
        </summary>
        <div class="grid grid-cols-3 gap-3 mt-2 pt-2 border-t border-dashed border-gray-200">
            <div>
                <label for="lat-{{ form_id }}" class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.latitude") }}</label>
                <input type="number" step="0.0001" name="lat" id="lat-{{ form_id }}"
                       class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
            <div>
                <label for="lon-{{ form_id }}" class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.longitude") }}</label>
                <input type="number" step="0.0001" name="lon" id="lon-{{ form_id }}"
                       class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
            <div>
                <label for="utc-{{ form_id }}" class="block text-[10px] text-gray-400 mb-0.5">{{ T("ui.utc_offset") }}</label>
                <input type="number" step="0.5" name="utc_offset" id="utc-{{ form_id }}" value="5.5"
                       class="w-full border border-gray-200 rounded-lg px-2 py-1.5 text-sm bg-gray-50 focus:bg-white focus:ring-2 focus:ring-saffron-400/50 outline-none">
            </div>
        </div>
    </details>
</div>

<script>
(function() {
    const formId = '{{ form_id }}';
    const wrapper = document.getElementById('place-wrapper-' + formId);
    const input = document.getElementById('place-input-' + formId);
    const dropdown = document.getElementById('place-dropdown-' + formId);
    const latInput = document.getElementById('lat-' + formId);
    const lonInput = document.getElementById('lon-' + formId);
    const utcInput = document.getElementById('utc-' + formId);
    let debounceTimer = null;
    let activeIndex = -1;

    input.addEventListener('input', function() {
        const q = this.value.trim();
        clearTimeout(debounceTimer);
        // Clear lat/lon when user changes the place text manually
        latInput.value = '';
        lonInput.value = '';
        if (q.length < 2) { hideDropdown(); return; }
        debounceTimer = setTimeout(() => fetchSuggestions(q), 300);
    });

    input.addEventListener('keydown', function(e) {
        const items = dropdown.querySelectorAll('[data-place-item]');
        if (!items.length) return;

        if (e.key === 'ArrowDown') {
            e.preventDefault();
            activeIndex = Math.min(activeIndex + 1, items.length - 1);
            highlightItem(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            activeIndex = Math.max(activeIndex - 1, 0);
            highlightItem(items);
        } else if (e.key === 'Enter' && activeIndex >= 0) {
            e.preventDefault();
            items[activeIndex].click();
        } else if (e.key === 'Escape') {
            hideDropdown();
        }
    });

    // Close dropdown when clicking outside — scoped to wrapper
    wrapper.addEventListener('focusout', function(e) {
        setTimeout(function() {
            if (!wrapper.contains(document.activeElement)) {
                hideDropdown();
            }
        }, 150);
    });

    function fetchSuggestions(q) {
        fetch('/api/geocode/suggest?q=' + encodeURIComponent(q))
            .then(function(r) {
                if (!r.ok) throw new Error('API error');
                return r.json();
            })
            .then(function(data) {
                renderDropdown(data.results || []);
            })
            .catch(function() {
                dropdown.innerHTML = '<div class="px-3 py-2.5 text-xs text-red-400">{{ T("ui.no_results") }}</div>';
                dropdown.classList.remove('hidden');
            });
    }

    function renderDropdown(results) {
        if (!results.length) {
            dropdown.innerHTML = '<div class="px-3 py-2.5 text-xs text-gray-400">{{ T("ui.no_results") }}</div>';
            dropdown.classList.remove('hidden');
            return;
        }
        activeIndex = -1;
        dropdown.innerHTML = results.map(function(r, i) {
            var label = r.district
                ? r.name + ', ' + r.district + ', ' + r.state
                : r.state ? r.name + ', ' + r.state : r.name;
            return '<button type="button" data-place-item data-idx="' + i + '" '
                + 'data-name="' + escHtml(r.name) + '" '
                + 'data-lat="' + Number(r.lat) + '" data-lon="' + Number(r.lon) + '" '
                + 'data-utc="' + Number(r.utc_offset || 5.5) + '" '
                + 'class="w-full text-left px-3 py-2 hover:bg-saffron-50 transition flex items-start gap-2 border-b border-gray-50 last:border-0">'
                + '<span class="text-saffron-500 text-xs mt-0.5">📍</span>'
                + '<span class="text-sm text-gray-700">' + escHtml(label) + '</span>'
                + '</button>';
        }).join('');
        dropdown.classList.remove('hidden');

        // Attach click handlers
        dropdown.querySelectorAll('[data-place-item]').forEach(function(btn) {
            btn.addEventListener('click', function() {
                input.value = this.dataset.name;
                latInput.value = this.dataset.lat;
                lonInput.value = this.dataset.lon;
                utcInput.value = this.dataset.utc;
                hideDropdown();
            });
        });
    }

    function highlightItem(items) {
        items.forEach(function(item, i) {
            item.classList.toggle('bg-saffron-50', i === activeIndex);
        });
    }

    function hideDropdown() {
        dropdown.classList.add('hidden');
        dropdown.innerHTML = '';
        activeIndex = -1;
    }

    function escHtml(s) {
        var d = document.createElement('div');
        d.textContent = s;
        return d.innerHTML;
    }
})();
</script>
